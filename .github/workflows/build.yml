name: Build Workflow
permissions:
  contents: write

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**.py'
      - .github/workflows/build.yml 
  push:
    branches:
      - main
    paths:
      - '**.py'
      - .github/workflows/build.yml 

jobs:
  build_matrix:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: pyird_Windows_x64.zip
            platform: windows
            arch: x64

          - os: windows-11-arm
            artifact_name: pyird_Windows_arm64.zip
            platform: windows
            arch: arm64

          - os: macos-15-intel
            artifact_name: pyird_MacOS_x64.zip
            platform: macos
            arch: x64

          - os: macos-latest
            artifact_name: pyird_MacOS_arm64.zip
            platform: macos
            arch: arm64

          - os: ubuntu-latest
            artifact_name: pyird_Linux_x64.zip
            platform: linux
            arch: x64

          - os: ubuntu-24.04-arm
            artifact_name: pyird_Linux_arm64.zip
            platform: linux
            arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Requirements
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Stamp Version into config.py
        shell: python
        run: |
          import re, subprocess, pathlib
          count = subprocess.check_output(["git", "rev-list", "--count", "HEAD"]).decode().strip()
          tag = f"v{count}"
          path = pathlib.Path("config.py")
          path.write_text(
              re.sub(
                  r'^APP_VERSION\s*=\s*"[^"]*"',
                  f'APP_VERSION = "{tag}"',
                  path.read_text(encoding="utf-8"),
                  flags=re.MULTILINE,
              ),
              encoding="utf-8",
          )
          print(f"Stamped version: {tag}")

      - name: Build Executable (Windows)
        if: matrix.platform == 'windows'
        run: |
          pyinstaller main.py --noconfirm --windowed --name "pyird" --icon="pyird.ico"
          Compress-Archive -Path "dist/pyird/*" -DestinationPath ${{ matrix.artifact_name }}

      - name: Build Executable (macOS)
        if: matrix.platform == 'macos'
        run: |
          pyinstaller main.py --noconfirm --windowed --name "pyird" \
            --osx-bundle-identifier "com.pyird.app"
          cd dist && zip -r ../${{ matrix.artifact_name }} pyird.app

      - name: Build Executable (Linux)
        if: matrix.platform == 'linux'
        run: |
          pyinstaller main.py --noconfirm --onefile --windowed --name "pyird"
          cd dist && zip -r ../${{ matrix.artifact_name }} pyird

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  create_release:
    needs: build_matrix
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version from Commit Count
        id: version
        run: |
          count=$(git rev-list --count HEAD)
          new_tag="v$count"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release_assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: Release ${{ steps.version.outputs.new_tag }}
          files: ./release_assets/*
          body: |
            Automated build for version ${{ steps.version.outputs.new_tag }}
            Changes in this release:
            ${{ github.event.head_commit.message }}